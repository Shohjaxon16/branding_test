<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <section class="skills-contact">
  <div class="container">
    
    <!-- OUR SKILLS -->
    <div class="skills-top">
      <div class="skills-left">
        <h2>OUR SKILLS</h2>

        <div class="skill-item">
          <div class="skill-head">
            <span>GRAPHIC DESIGN</span>
            <span>80%</span>
          </div>
          <div class="skill-line">
            <div class="skill-fill w-80"></div>
          </div>
        </div>

        <div class="skill-item">
          <div class="skill-head">
            <span>LEAD GENERATION</span>
            <span>41%</span>
          </div>
          <div class="skill-line">
            <div class="skill-fill w-41"></div>
          </div>
        </div>

        <div class="skill-item">
          <div class="skill-head">
            <span>PHOTOSHOP</span>
            <span>70%</span>
          </div>
          <div class="skill-line">
            <div class="skill-fill w-70"></div>
          </div>
        </div>

        <div class="skill-item">
          <div class="skill-head">
            <span>ILLUSTRATION</span>
            <span>100%</span>
          </div>
          <div class="skill-line">
            <div class="skill-fill w-100"></div>
          </div>
        </div>

        <p class="skills-note">
          * Companies we've helped build their website with Görm
        </p>
      </div>

      <div class="skills-right">
        <img src="img/ourskills_img.png" alt="Our Skills Image">
      </div>
    </div>

    <!-- FUN FACTS -->
    <div class="fun-facts">
      <h3>FUN FACTS</h3>

      <div class="facts-grid">
        <div class="fact-item">
          <img src="img/lampochka.png" alt="Lampochka">
          <div class="fact-text">
            <h4>10</h4>
            <p>Years on market</p>
          </div>
        </div>

        <div class="fact-item">
          <img src="img/like.png" alt="Like">
          <div class="fact-text">
            <h4>340+</h4>
            <p>Project done</p>
          </div>
        </div>

        <div class="fact-item">
          <img src="img/odam.png" alt="Odam">
          <div class="fact-text">
            <h4>17</h4>
            <p>Hero's member</p>
          </div>
        </div>

        <div class="fact-item">
          <img src="img/kofe.png" alt="Kofe">
          <div class="fact-text">
            <h4>900+</h4>
            <p>Cups of coffee</p>
          </div>
        </div>
      </div>
    </div>

    <!-- CONTACT US -->
    <div class="contact-section">
      <div class="contact-image">
        <img src="img/contact_img.png" alt="Contact Image">
      </div>

      <div class="contact-form-box">
        <h2>CONTACT US</h2>

        <form class="contact-form">
          <input type="text" placeholder="Name*">
          <input type="email" placeholder="Email*">
          <input type="text" placeholder="Website URL*">
          <textarea placeholder="Project Details*"></textarea>
          <button class="btn_contact" type="submit">SEND PROPOSAL</button>
        </form>
      </div>
    </div>

  </div>
</section>
</body>
</html>
